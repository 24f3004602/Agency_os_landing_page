# Production compose — runs on agencyos-app VM
# Services: FastAPI, Celery worker, Celery Beat
# Data services (Postgres, Redis, Qdrant) run on the data VM
# nginx runs on the host (not in Docker) for SSL termination

version: '3.9'

services:

  # ── FastAPI application ──────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: agencyos-api:latest
    container_name: agencyos_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # only localhost — nginx proxies externally
    env_file:
      - ../backend/.env
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --proxy-headers
      --forwarded-allow-ips='*'
    volumes:
      - media_data:/app/media    # PDFs, payslips, reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - celery_worker

  # ── Celery worker ────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: agencyos-api:latest
    container_name: agencyos_celery_worker
    restart: unless-stopped
    env_file:
      - ../backend/.env
    command: >
      celery -A celery_worker.celery_app worker
      --loglevel=info
      --queues=m1,m2,m3,m4,m5,m6,m7,m8,m9,m10,m11,agents,default
      --concurrency=4
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_worker.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 15s
      retries: 3

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: agencyos-api:latest
    container_name: agencyos_celery_beat
    restart: unless-stopped
    env_file:
      - ../backend/.env
    command: >
      celery -A celery_worker.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /tmp/celerybeat-schedule
    volumes:
      - media_data:/app/media
      - beat_schedule:/tmp

volumes:
  media_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/agencyos/media

  beat_schedule:
    driver: local